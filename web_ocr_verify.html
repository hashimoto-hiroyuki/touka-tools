<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OCR照合</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e65100'/><path d='M7 10h18M7 16h18M7 22h12' stroke='white' stroke-width='2' stroke-linecap='round'/><circle cx='24' cy='22' r='4' fill='%2343a047' stroke='white' stroke-width='1.5'/><path d='M22.5 22l1 1 2-2' stroke='white' stroke-width='1.2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, #e65100 0%, #bf360c 100%); padding: 10px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-shrink: 0; color: #fff; }
        .header h1 { font-size: 17px; font-weight: 700; }
        .header .subtitle { font-size: 11px; color: rgba(255,255,255,0.7); }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .user-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .user-badge:hover { background: rgba(255,255,255,0.25); }
        .main-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
        .sidebar-header { padding: 12px 16px; border-bottom: 1px solid #e0e0e0; font-weight: 600; font-size: 13px; background: #fafafa; display: flex; align-items: center; justify-content: space-between; }
        .sidebar-header .count { font-weight: 400; color: #888; font-size: 11px; }
        .btn-refresh { background: none; border: 1px solid #ddd; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; color: #555; }
        .btn-refresh:hover { background: #f0f0f0; }
        .file-list { flex: 1; overflow-y: auto; }
        .file-item { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.15s; font-size: 12px; }
        .file-item:hover { background: #fff3e0; }
        .file-item.active { background: #ffe0b2; border-left: 3px solid #e65100; }
        .file-item .fi-name { font-weight: 600; color: #333; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-item .fi-info { color: #888; margin-top: 2px; font-size: 11px; }
        .file-item .fi-meta { color: #666; margin-top: 2px; font-size: 11px; }
        .main-panel { flex: 1; overflow: hidden; padding: 0; display: flex; flex-direction: column; min-height: 0; }
        .welcome-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; gap: 12px; }
        .welcome-view .icon-big { font-size: 64px; opacity: 0.3; }
        .welcome-view p { font-size: 14px; }
        /* 横並びレイアウト: 左PDF + 右OCR結果 */
        .split-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        .split-left { width: 50%; min-width: 300px; border-right: 2px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .split-right { width: 50%; min-width: 300px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .pdf-preview-section { background: #fff; padding: 8px 12px; flex-shrink: 0; }
        .pdf-preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .pdf-preview-header h3 { font-size: 13px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-toggle-preview { background: none; border: 1px solid #ddd; border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer; color: #555; flex-shrink: 0; }
        .btn-toggle-preview:hover { background: #f5f5f5; }
        .pdf-iframe-wrapper { flex: 1; border: 1px solid #ddd; border-radius: 4px; overflow: auto; position: relative; background: #e0e0e0; overscroll-behavior: contain; min-height: 0; }
        /* PDF画像表示（PDF.jsでcanvasにレンダリング） */
        .pdf-pages-container { position: relative; display: inline-block; min-width: 100%; }
        .pdf-page-wrapper { position: relative; margin-bottom: 4px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
        .pdf-page-wrapper canvas { display: block; width: 100%; height: auto; }
        /* ハイライト矩形（各ページ内に%座標で配置、スクロール追従） */
        .pdf-highlight-rect { position: absolute; border: 3px solid #e65100; background: rgba(255,152,0,0.18); border-radius: 3px; transition: all 0.3s ease; box-shadow: 0 0 12px rgba(230,81,0,0.35); z-index: 5; pointer-events: none; display: none; }
        .pdf-highlight-rect::before { content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px; border: 1px solid rgba(230,81,0,0.25); border-radius: 5px; }
        .calib-dot { position: absolute; width: 12px; height: 12px; background: #d32f2f; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; box-shadow: 0 0 6px rgba(0,0,0,0.4); pointer-events: none; }
        .calib-banner { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #d32f2f; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; z-index: 100; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.3); pointer-events: none; }
        .pdf-loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }
        .ocr-button-section { padding: 12px 20px; background: #fff; border-bottom: 1px solid #e0e0e0; text-align: center; flex-shrink: 0; }
        .btn-ocr { padding: 12px 40px; background: #e65100; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-ocr:hover { background: #bf360c; }
        .btn-ocr:disabled { background: #ccc; cursor: not-allowed; }
        .ocr-status { margin-top: 8px; font-size: 13px; color: #666; }
        .questions-area { padding: 12px 16px; overflow-y: auto; flex: 1; overscroll-behavior: contain; min-height: 0; }
        .q-block { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 8px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; cursor: pointer; }
        .q-block.q-active { border-color: #ff9800; box-shadow: 0 0 0 2px rgba(255,152,0,0.25); }
        .q-block.confirmed { border-color: #a5d6a7; background: #f1f8e9; }
        .q-block.needs-check { border-color: #ffcc80; background: #fff8e1; }
        .q-content { flex: 1; }
        .q-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .q-label .confidence { font-weight: 400; color: #999; margin-left: 6px; }
        .q-label .confidence.low { color: #e65100; font-weight: 600; }
        .q-pos-hint { font-size: 9px; font-weight: 400; color: #999; background: #f5f5f5; padding: 1px 5px; border-radius: 8px; white-space: nowrap; }
        .q-input { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 6px 8px; font-size: 13px; font-family: inherit; resize: vertical; }
        .q-input:focus { border-color: #e65100; outline: none; box-shadow: 0 0 0 2px rgba(230,81,0,0.15); }
        .q-input:disabled { background: #f5f5f5; color: #333; }
        .q-actions { display: flex; gap: 6px; margin-left: 8px; flex-shrink: 0; align-self: center; }
        .btn-ok { padding: 6px 14px; background: #43a047; color: #fff; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn-ok:hover { background: #388e3c; }
        .btn-ok.confirmed-btn { background: #a5d6a7; color: #2e7d32; cursor: default; }
        .btn-edit { padding: 6px 14px; background: #fff; color: #555; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-edit:hover { background: #f5f5f5; }
        .confirm-all-wrapper { text-align: right; padding: 8px 20px; flex-shrink: 0; }
        .btn-confirm-all { padding: 10px 25px; background: #FF9800; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: 700; cursor: pointer; }
        .btn-confirm-all:hover { background: #F57C00; }
        .btn-confirm-all.hidden { display: none; }
        .bottom-bar { background: #fff; border-top: 1px solid #e0e0e0; padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .progress-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .progress-badge.partial { background: #fff3e0; color: #e65100; }
        .progress-badge.all-ok { background: #e8f5e9; color: #2e7d32; }
        .btn-save { padding: 8px 24px; background: #43a047; color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .btn-save:hover { background: #388e3c; }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
        #statusText { font-size: 12px; color: #666; flex: 1; }
        /* ナビマーカー */
        .pdf-nav-marker { position: absolute; left: 2px; width: 22px; height: 16px; background: #e65100; color: #fff; font-size: 8px; font-weight: 700; text-align: center; line-height: 16px; border-radius: 3px; cursor: pointer; transition: all 0.2s; z-index: 11; }
        .pdf-nav-marker:hover { background: #bf360c; transform: scale(1.15); }
        .pdf-nav-marker.active { background: #ff6d00; box-shadow: 0 0 6px rgba(255,109,0,0.6); transform: scale(1.2); }
        .loading-spinner { text-align: center; padding: 40px; color: #999; font-size: 14px; }
        .loading-spinner::before { content: ''; display: block; width: 32px; height: 32px; margin: 0 auto 12px; border: 3px solid #eee; border-top-color: #e65100; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 13px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="header">
        <div>
            <h1>Web OCR照合</h1>
            <div class="subtitle">ブラウザだけでPDF読み取り・照合（Python不要）</div>
        </div>
        <div class="header-right">
            <div class="user-badge" onclick="changeUser()" title="クリックして変更">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span id="userName">-</span>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>元PDFフォルダ <span class="count" id="fileCount"></span></span>
                <button class="btn-refresh" onclick="loadPdfList()">更新</button>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <div class="main-panel" id="mainPanel">
            <div class="welcome-view" id="welcomeView">
                <div class="icon-big">📄</div>
                <p>左のリストからPDFを選択してください</p>
            </div>

            <div id="activeView" style="display:none;" class="split-layout">
                <!-- 左: PDFプレビュー -->
                <div class="split-left">
                    <div class="pdf-preview-section" id="previewSection">
                        <div class="pdf-preview-header">
                            <h3 id="pdfTitle">-</h3>
                            <span id="pageIndicator" style="display:none; font-size:11px; color:#e65100; font-weight:600; background:#fff3e0; padding:2px 8px; border-radius:10px;"></span>
                            <button class="btn-toggle-preview" onclick="zoomPdf(-1)" title="縮小">−</button>
                            <span id="zoomLevel" style="font-size:11px; color:#555; min-width:36px; text-align:center;">100%</span>
                            <button class="btn-toggle-preview" onclick="zoomPdf(1)" title="拡大">＋</button>
                            <button class="btn-toggle-preview" onclick="startCurrentRectDefine()" title="現在の質問のハイライト矩形を定義" id="btnRectDefine">矩形定義</button>
                            <button class="btn-toggle-preview" onclick="adjustHighlight()" title="全矩形のリセット" style="font-size:10px;">リセット</button>
                            <button class="btn-toggle-preview" onclick="togglePreview()">プレビュー非表示</button>
                        </div>
                    </div>
                    <div class="pdf-iframe-wrapper" id="iframeWrapper">
                        <div id="pdfNavBar" style="position:absolute;left:0;top:0;width:28px;height:100%;background:rgba(0,0,0,0.03);z-index:10;overflow:visible;"></div>
                        <div class="pdf-pages-container" id="pdfPagesContainer">
                            <div class="pdf-loading" id="pdfLoading">PDFを選択してください</div>
                        </div>
                    </div>
                </div>
                <!-- 右: OCR結果・照合 -->
                <div class="split-right">
                    <div class="ocr-button-section" id="ocrSection">
                        <button class="btn-ocr" id="ocrBtn" onclick="runOcr()">OCR実行（Gemini）</button>
                        <div class="ocr-status" id="ocrStatus"></div>
                    </div>
                    <div class="questions-area" id="questionsArea" style="display:none;"></div>
                    <div class="confirm-all-wrapper" id="confirmAllWrapper" style="display:none;">
                        <button class="btn-confirm-all" onclick="confirmAllRemaining()">残り全てOK</button>
                    </div>
                    <div class="bottom-bar" id="bottomBar" style="display:none;">
                        <span class="progress-badge partial" id="progressBadge">0/17 確認済み</span>
                        <span id="statusText">各項目を確認してください（Shift+OKで一括確認）</span>
                        <button class="btn-save" id="saveBtn" disabled onclick="saveVerified()">照合完了・保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 定数 ==========
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyYnnni3ww8q2KJIPom0ljkVjseQuPMGULQq2lHh21BN63EwLECb_6XsEX9yMpPG_Ri/exec';

        const QUESTION_ORDER = [
            '医療機関名', '患者さんID',
            '質問1_名前', '質問2_生年月日', '質問3_性別', '質問4_血液型', '質問5_身体情報',
            '質問6_糖尿病', '質問7_脂質異常症', '質問8_兄弟糖尿病歴', '質問9_両親糖尿病歴',
            '質問10_運動', '質問11_飲み物', '質問12_お菓子', '質問13_飲酒習慣',
            '質問14_歯の抜去位置', '質問15_コメント'
        ];

        const QUESTION_LABELS = {
            '医療機関名': '医療機関名',
            '患者さんID': '患者さんID',
            '質問1_名前': '質問1: 名前（カタカナ）',
            '質問2_生年月日': '質問2: 生年月日',
            '質問3_性別': '質問3: 性別',
            '質問4_血液型': '質問4: 血液型',
            '質問5_身体情報': '質問5: 身長・体重',
            '質問6_糖尿病': '質問6: 糖尿病',
            '質問7_脂質異常症': '質問7: 脂質異常症',
            '質問8_兄弟糖尿病歴': '質問8: 兄弟の糖尿病歴',
            '質問9_両親糖尿病歴': '質問9: 両親の糖尿病歴',
            '質問10_運動': '質問10: 運動習慣',
            '質問11_飲み物': '質問11: 飲み物',
            '質問12_お菓子': '質問12: お菓子',
            '質問13_飲酒習慣': '質問13: 飲酒習慣',
            '質問14_歯の抜去位置': '質問14: 歯の抜去位置',
            '質問15_コメント': '質問15: コメント欄'
        };

        // ========== 質問ごとのハイライト矩形（手動指定、GAS+localStorage保存） ==========
        // 各質問の矩形をPDF上で対角2点クリックで定義
        // 保存形式: { key: { x1%, y1%, x2%, y2% } } (overlay内の%座標)
        // GAS ScriptPropertiesに保存し、localStorageはキャッシュとして使用
        var questionRects = JSON.parse(localStorage.getItem('webOcrQuestionRects') || '{}');
        var QUESTION_HINTS = {
            '医療機関名': 'P1 最上部', '患者さんID': 'P1 上部',
            '質問1_名前': 'P1 上部', '質問2_生年月日': 'P1 上部',
            '質問3_性別': 'P1 上部', '質問4_血液型': 'P1 上部',
            '質問5_身体情報': 'P1 上〜中', '質問6_糖尿病': 'P1 中部',
            '質問7_脂質異常症': 'P1 中部', '質問8_兄弟糖尿病歴': 'P1 中部',
            '質問9_両親糖尿病歴': 'P1 中部', '質問10_運動': 'P1 中〜下',
            '質問11_飲み物': 'P1 中〜下', '質問12_お菓子': 'P1 下部',
            '質問13_飲酒習慣': 'P1 下部',
            '質問14_歯の抜去位置': 'P2 中部', '質問15_コメント': 'P2 下部'
        };

        // ========== State ==========
        let currentUser = '';
        let pdfList = [];
        let currentFileId = null;
        let currentFileName = null;
        let currentOcrData = null;
        let questionStates = {};
        let jsonpCounter = 0;
        let previewVisible = true;
        var activeQuestionIdx = -1;

        // ========== 初期化 ==========
        window.addEventListener('DOMContentLoaded', function() {
            initUser();
            loadPdfList();
            loadQuestionRectsFromDrive();
        });

        // GASから矩形データを読み込み（localStorage更新 + ナビバー再構築）
        function loadQuestionRectsFromDrive() {
            gasCall('getQuestionRects', null, 15000).then(function(data) {
                if (data && typeof data === 'object' && Object.keys(data).length > 0) {
                    questionRects = data;
                    localStorage.setItem('webOcrQuestionRects', JSON.stringify(questionRects));
                    buildNavBar();
                    console.log('矩形データをDriveから読み込み:', Object.keys(data).length + '件');
                } else {
                    // Driveにデータなし: localStorageにデータがあればDriveにアップロード
                    if (Object.keys(questionRects).length > 0) {
                        console.log('localStorageの矩形データをDriveにアップロード:', Object.keys(questionRects).length + '件');
                        saveQuestionRectsToDrive();
                    } else {
                        console.log('矩形データなし（Drive・localStorage共に空）');
                    }
                }
            }).catch(function(err) {
                console.log('矩形データ読み込みエラー（localStorageを使用）:', err.message);
            });
        }

        // GASに矩形データを保存
        function saveQuestionRectsToDrive() {
            gasPost({ action: 'saveQuestionRects', rects: questionRects }).then(function() {
                console.log('矩形データをDriveに保存完了');
            }).catch(function(err) {
                console.log('矩形データ保存エラー:', err.message);
            });
        }

        function initUser() {
            currentUser = localStorage.getItem('webOcrUser') || '';
            if (!currentUser) {
                changeUser();
            } else {
                document.getElementById('userName').textContent = currentUser;
            }
        }

        function changeUser() {
            var name = prompt('照合者名を入力してください（例: 田中）:', currentUser || '');
            if (name && name.trim()) {
                currentUser = name.trim();
                localStorage.setItem('webOcrUser', currentUser);
                document.getElementById('userName').textContent = currentUser;
            }
        }

        // ========== GAS通信 ==========
        function gasCall(action, params, timeoutMs) {
            return new Promise(function(resolve, reject) {
                var callbackName = 'gasCb_' + Date.now() + '_' + (jsonpCounter++);
                var url = GAS_API_URL + '?action=' + action + '&callback=' + callbackName;
                if (params) {
                    for (var key in params) {
                        url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
                    }
                }
                var timeout = timeoutMs || 30000;
                var done = false;
                window[callbackName] = function(result) {
                    done = true;
                    cleanup();
                    if (result && result.success) {
                        resolve(result.data || result);
                    } else {
                        reject(new Error((result && result.error) || 'API error'));
                    }
                };
                var script = document.createElement('script');
                script.src = url;
                script.onerror = function() { if (!done) { done = true; cleanup(); reject(new Error('Network error')); } };
                document.head.appendChild(script);
                var timer = setTimeout(function() { if (!done) { done = true; cleanup(); reject(new Error('Timeout')); } }, timeout);
                function cleanup() { clearTimeout(timer); try { delete window[callbackName]; } catch(e){} try { document.head.removeChild(script); } catch(e){} }
            });
        }

        function gasPost(payload) {
            return new Promise(function(resolve, reject) {
                var iframeName = 'postFrame_' + Date.now();
                var iframe = document.createElement('iframe');
                iframe.name = iframeName;
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = GAS_API_URL;
                form.target = iframeName;
                form.style.display = 'none';
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'payload';
                input.value = JSON.stringify(payload);
                form.appendChild(input);
                document.body.appendChild(form);
                iframe.onload = function() { cleanupPost(); resolve({ success: true }); };
                var timer = setTimeout(function() { cleanupPost(); resolve({ success: true, data: { message: 'Timeout (assumed success)' } }); }, 30000);
                function cleanupPost() { clearTimeout(timer); if (form.parentNode) document.body.removeChild(form); setTimeout(function() { if (iframe.parentNode) document.body.removeChild(iframe); }, 1000); }
                form.submit();
            });
        }

        // ========== PDF一覧 ==========
        function loadPdfList() {
            var listEl = document.getElementById('fileList');
            listEl.innerHTML = '<div class="loading-spinner">PDF一覧を読み込み中...</div>';
            gasCall('getDrivePdfList', null, 60000).then(function(data) {
                pdfList = data || [];
                renderPdfList();
            }).catch(function(err) {
                listEl.innerHTML = '<div class="empty-msg">読み込みエラー: ' + escapeHtml(err.message) + '</div>';
            });

        function renderPdfList() {
            var listEl = document.getElementById('fileList');
            document.getElementById('fileCount').textContent = '(' + pdfList.length + '件)';
            if (pdfList.length === 0) {
                listEl.innerHTML = '<div class="empty-msg">PDFファイルがありません</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < pdfList.length; i++) {

                var isActive = pdf.fileId === currentFileId;

                if (pdf.patientName) meta += (meta ? ' / ' : '') + pdf.patientName;

                html += '<div class="fi-name">' + escapeHtml(pdf.fileName) + '</div>';
                if (meta) html += '<div class="fi-meta">' + escapeHtml(meta) + '</div>';

        // ========== PDF選択 ==========
        function selectPdf(fileId, fileName) {
            currentFileId = fileId;
            currentFileName = fileName;
            currentOcrData = null;
            questionStates = {};

            document.getElementById('welcomeView').style.display = 'none';
            document.getElementById('activeView').style.display = '';
            document.getElementById('questionsArea').style.display = 'none';
            document.getElementById('questionsArea').innerHTML = '';
            document.getElementById('confirmAllWrapper').style.display = 'none';
            document.getElementById('bottomBar').style.display = 'none';
            document.getElementById('ocrSection').style.display = '';
            document.getElementById('ocrBtn').disabled = false;

        }

        var pdfPageWrappers = [];  // 各ページのwrapperDiv
        var pdfDoc = null;
        var currentScale = 1.5;  // PDF.jsの描画スケール
        var baseScale = 1.5;     // 100%に対応するスケール

        var lastPdfBytes = null;  // PDF.jsフォールバック用にBase64デコード済みデータを保持

        // PDF.js Worker設定（早期初期化）
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        function loadPdfWithPdfJs(fileId) {
            var container = document.getElementById('pdfPagesContainer');
            container.innerHTML = '<div class="pdf-loading">PDF読み込み中...</div>';
            pdfPageWrappers = [];
            lastPdfBytes = null;

            // GASからPDFのBase64を一時ファイル経由で取得
            document.getElementById('ocrStatus').textContent = 'PDFを読み込み中...';
            gasCall('getPdfPageImages', { fileId: fileId }, 120000).then(function(data) {
                if (!data || !data.tempFileId) throw new Error(data.message || 'PDF取得失敗');
                document.getElementById('ocrStatus').textContent = 'PDFデータを取得中...';
                // GAS経由でBase64テキストを直接取得（CORSフリー）
                return gasCall('getRawTempFile', { tempFileId: data.tempFileId }, 120000).then(function(rawData) {
                    if (!rawData || !rawData.content) throw new Error('Base64データ取得失敗');
                    return rawData.content;
                });
            }).then(function(base64Text) {
                // Base64をArrayBufferに変換
                var binary = atob(base64Text.trim());
                var bytes = new Uint8Array(binary.length);
                for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                lastPdfBytes = bytes;

                // PDF.jsでレンダリング
                return pdfjsLib.getDocument({ data: bytes }).promise;
            }).then(function(pdf) {
                pdfDoc = pdf;
                container.innerHTML = '';
                var renderPromises = [];
                for (var p = 1; p <= pdf.numPages; p++) {
                    renderPromises.push(renderPage(pdf, p, container));
                }
                return Promise.all(renderPromises);
            }).then(function() {
                document.getElementById('ocrStatus').textContent = '';
            }).catch(function(err) {
                console.log('PDF.jsエラー:', err.message);
                document.getElementById('ocrStatus').textContent = 'PDFプレビュー: Blob表示モード（OCRは実行可能です）';
                // フォールバック: Blob URLでPDFを表示（CSPブロック回避）
                container.innerHTML = '';
                if (lastPdfBytes) {
                    // Base64デコード済みデータがある場合: Blob URLで表示
                    var blob = new Blob([lastPdfBytes], { type: 'application/pdf' });
                    var blobUrl = URL.createObjectURL(blob);
                    var wrapper = document.createElement('div');
                    wrapper.className = 'pdf-page-wrapper';
                    wrapper.id = 'pdfPage_1';
                    wrapper.style.position = 'relative';
                    var embed = document.createElement('embed');
                    embed.src = blobUrl;
                    embed.type = 'application/pdf';
                    embed.style.cssText = 'width:100%;height:1200px;border:none;display:block;';
                    wrapper.appendChild(embed);
                    var highlightRect = document.createElement('div');
                    highlightRect.className = 'pdf-highlight-rect';
                    highlightRect.id = 'pdfHighlight_1';
                    wrapper.appendChild(highlightRect);
                    container.appendChild(wrapper);
                    pdfPageWrappers[1] = wrapper;
                    // 2ページ目用のハイライト要素（embed内は単一表示なのでダミー）
                    var wrapper2 = document.createElement('div');
                    wrapper2.className = 'pdf-page-wrapper';
                    wrapper2.id = 'pdfPage_2';
                    wrapper2.style.cssText = 'position:relative;height:0;overflow:hidden;';
                    var highlightRect2 = document.createElement('div');
                    highlightRect2.className = 'pdf-highlight-rect';
                    highlightRect2.id = 'pdfHighlight_2';
                    wrapper2.appendChild(highlightRect2);
                    container.appendChild(wrapper2);
                    pdfPageWrappers[2] = wrapper2;
                } else {
                    // Base64データも取得できなかった場合: エラーメッセージ表示
                    container.innerHTML = '<div class="pdf-loading">PDFの読み込みに失敗しました。<br>OCRは実行可能です。</div>';
                }
                buildNavBar();
            });
        }

        function renderPage(pdf, pageNum, container) {
            return pdf.getPage(pageNum).then(function(page) {
                var viewport = page.getViewport({ scale: currentScale });
                var canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                var wrapper = document.createElement('div');
                wrapper.className = 'pdf-page-wrapper';
                wrapper.id = 'pdfPage_' + pageNum;
                wrapper.appendChild(canvas);

                // ハイライト矩形要素を追加（各ページに1つ）
                var highlightRect = document.createElement('div');
                highlightRect.className = 'pdf-highlight-rect';
                highlightRect.id = 'pdfHighlight_' + pageNum;
                wrapper.appendChild(highlightRect);

                container.appendChild(wrapper);
                pdfPageWrappers[pageNum] = wrapper;

                var ctx = canvas.getContext('2d');
                return page.render({ canvasContext: ctx, viewport: viewport }).promise;
            });
        }

        function reRenderAllPages() {
            if (!pdfDoc) return;
            var container = document.getElementById('pdfPagesContainer');
            container.innerHTML = '';
            pdfPageWrappers = [];
            var renderPromises = [];
            for (var p = 1; p <= pdfDoc.numPages; p++) {
                renderPromises.push(renderPage(pdfDoc, p, container));
            }
            Promise.all(renderPromises).then(function() {
                // ハイライト再表示
                if (activeQuestionIdx >= 0) highlightPdfPosition(activeQuestionIdx);
            });
        }

        function zoomPdf(direction) {
            var step = 0.25;
            var newScale = currentScale + direction * step;
            if (newScale < 0.5) newScale = 0.5;
            if (newScale > 4.0) newScale = 4.0;
            currentScale = newScale;
            var pct = Math.round((currentScale / baseScale) * 100);
            document.getElementById('zoomLevel').textContent = pct + '%';
            reRenderAllPages();
        }

        function togglePreview() {
            var wrapper = document.getElementById('iframeWrapper');
            previewVisible = !previewVisible;
            wrapper.style.display = previewVisible ? '' : 'none';
        }

        // ========== OCR実行 ==========
        function runOcr() {
            if (!currentFileId) return;
            var btn = document.getElementById('ocrBtn');
            var status = document.getElementById('ocrStatus');
            btn.disabled = true;
            btn.textContent = 'OCR処理中...';
            status.textContent = 'Gemini APIにPDFを送信中... (20〜60秒かかります)';
            var startTime = Date.now();

            gasCall('ocrFullPdfWithGemini', { fileId: currentFileId }, 180000).then(function(data) {
                var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                if (data && data.ocrTempFileId) {
                    status.textContent = 'OCR結果を読み込み中...';
                    return gasCall('getOcrTempResult', { tempFileId: data.ocrTempFileId }, 30000);
                } else if (data && data.ocrData) {
                    return { ocrData: data.ocrData };
                } else {
                    throw new Error(data.message || '不明なエラー');
                }
            }).then(function(data) {
                var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                if (data && data.ocrData) {
                    currentOcrData = data.ocrData;
                    status.textContent = 'OCR完了 (' + elapsed + '秒)';
                    btn.textContent = 'OCR完了';
                    document.getElementById('ocrSection').style.display = 'none';
                    renderQuestions(currentOcrData);
                } else {
                    status.textContent = 'OCR失敗: OCR結果データなし';
                    btn.disabled = false;
                    btn.textContent = 'OCR再実行';
                }
            }).catch(function(err) {
                var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                status.textContent = 'エラー (' + elapsed + '秒): ' + err.message;
                btn.disabled = false;
                btn.textContent = 'OCR再実行';
            });
        }

        // ========== ナビゲーション ==========
        function highlightPdfPosition(idx) {
            var key = QUESTION_ORDER[idx];

            // 前のアクティブ状態をクリア
            var prevActive = document.querySelector('.q-block.q-active');
            if (prevActive) prevActive.classList.remove('q-active');
            var prevMarker = document.querySelector('.pdf-nav-marker.active');
            if (prevMarker) prevMarker.classList.remove('active');

            // 質問ブロックをアクティブに
            var block = document.getElementById('qblock_' + idx);
            if (block) block.classList.add('q-active');
            activeQuestionIdx = idx;

            // ナビマーカーをアクティブに
            var marker = document.getElementById('navMarker_' + idx);
            if (marker) marker.classList.add('active');

            // 全ページのハイライトを非表示
            var allHighlights = document.querySelectorAll('.pdf-highlight-rect');
            for (var h = 0; h < allHighlights.length; h++) allHighlights[h].style.display = 'none';

            // ハイライト矩形を表示（手動指定済みの場合のみ）
            var qr = questionRects[key];
            if (qr) {
                var pageNum = qr.page || 1;
                var rect = document.getElementById('pdfHighlight_' + pageNum);
                if (rect) {
                    rect.style.left = qr.x1 + '%';
                    rect.style.top = qr.y1 + '%';
                    rect.style.width = (qr.x2 - qr.x1) + '%';
                    rect.style.height = (qr.y2 - qr.y1) + '%';
                    rect.style.display = 'block';
                }
            }

            // ページインジケーター
            var hint = QUESTION_HINTS[key] || '';
            if (hint.indexOf('P2') >= 0) {
                document.getElementById('pageIndicator').textContent = '2ページ目';
                document.getElementById('pageIndicator').style.display = '';
            } else {
                document.getElementById('pageIndicator').style.display = 'none';
            }

            // PDF自動スクロール
            scrollPdfToQuestion(key, idx);
        }

        // スクロール完了を検出するヘルパー（scrollendイベント or タイムアウト）
        function waitForScrollEnd(el, timeout) {
            return new Promise(function(resolve) {
                var timer = null;
                var done = false;
                function finish() {
                    if (done) return;
                    done = true;
                    el.removeEventListener('scroll', onScroll);
                    resolve();
                }
                function onScroll() {
                    clearTimeout(timer);
                    timer = setTimeout(finish, 80);
                }
                el.addEventListener('scroll', onScroll);
                // スクロール量が0の場合scrollイベントが発火しないためタイムアウト
                setTimeout(finish, timeout || 400);
            });
        }

        // PDF矩形の画面上Y座標を取得
        function getPdfRectScreenY(wrapper, qr, pageEl) {
            if (!pageEl || !qr) return null;
            var pageRect = pageEl.getBoundingClientRect();
            return pageRect.top + (pageEl.offsetHeight * qr.y1 / 100);
        }

        function scrollPdfToQuestion(key, idx) {
            var wrapper = document.getElementById('iframeWrapper');
            if (!wrapper) return;

            var embed = wrapper.querySelector('embed');
            if (embed) return;

            var questionsArea = document.getElementById('questionsArea');
            var block = document.getElementById('qblock_' + idx);
            if (!block || !questionsArea) return;

            var qr = questionRects[key];
            var pageEl = null;
            var pageNum = 1;

            if (qr) {
                pageNum = qr.page || 1;
                pageEl = document.getElementById('pdfPage_' + pageNum);
            } else {
                var hint = QUESTION_HINTS[key] || '';
                pageNum = hint.indexOf('P2') >= 0 ? 2 : 1;
                pageEl = document.getElementById('pdfPage_' + pageNum);
                if (!pageEl) return;
                // 推定用の仮qrを作成
                var samePageKeys = QUESTION_ORDER.filter(function(k) {
                    var h = QUESTION_HINTS[k] || '';
                    return (hint.indexOf('P2') >= 0) === (h.indexOf('P2') >= 0);
                });
                var posInPage = samePageKeys.indexOf(key);
                var yRatio = (posInPage >= 0 && samePageKeys.length > 1) ? posInPage / samePageKeys.length : 0.5;
                qr = { y1: yRatio * 100, page: pageNum };
            }
            if (!pageEl) return;

            // ステップ1: 左パネル — PDF矩形上端をパネル上端から少し下にスクロール
            var pdfTopMargin = 4; // 上端の余白px（ヘッダーに隠れ防止）
            var rectScreenY = getPdfRectScreenY(wrapper, qr, pageEl);
            var wrapperRect = wrapper.getBoundingClientRect();
            var pdfScrollDelta = rectScreenY - wrapperRect.top - pdfTopMargin;
            var pdfDesiredScroll = wrapper.scrollTop + pdfScrollDelta;
            var pdfMaxScroll = wrapper.scrollHeight - wrapper.clientHeight;
            wrapper.scrollTo({ top: Math.max(0, Math.min(pdfDesiredScroll, Math.max(0, pdfMaxScroll))), behavior: 'smooth' });

            // ステップ2: 左パネルのスクロール完了を待ってから右パネルを合わせる
            waitForScrollEnd(wrapper, 400).then(function() {
                // 実際のPDF矩形画面Y座標を再取得
                var actualRectY = getPdfRectScreenY(wrapper, qr, pageEl);

                // 右パネルのブロック上端を同じ画面Y座標に合わせる
                var blockY = block.getBoundingClientRect().top;
                var blockDelta = blockY - actualRectY;
                var blockScroll = questionsArea.scrollTop + blockDelta;
                questionsArea.scrollTo({ top: Math.max(0, blockScroll), behavior: 'smooth' });

                // ステップ3: 右パネルのスクロール完了後、最終補正
                waitForScrollEnd(questionsArea, 400).then(function() {
                    var finalRectY = getPdfRectScreenY(wrapper, qr, pageEl);
                    var finalBlockY = block.getBoundingClientRect().top;
                    var gap = finalBlockY - finalRectY;

                    // 2px以上のズレがあれば補正
                    if (Math.abs(gap) > 2) {
                        // 右パネルで補正可能か確認
                        var qaMaxScroll = questionsArea.scrollHeight - questionsArea.clientHeight;
                        var qaNewScroll = questionsArea.scrollTop + gap;
                        if (qaNewScroll >= 0 && qaNewScroll <= qaMaxScroll) {
                            questionsArea.scrollTo({ top: qaNewScroll, behavior: 'smooth' });
                        } else {
                            // 右パネル限界 → 左パネルを逆方向に補正
                            wrapper.scrollTo({ top: Math.max(0, wrapper.scrollTop - gap), behavior: 'smooth' });
                        }
                    }
                });
            });
        }

        function buildNavBar() {
            var navBar = document.getElementById('pdfNavBar');
            if (!navBar) return;
            navBar.innerHTML = '';
            for (var i = 0; i < QUESTION_ORDER.length; i++) {
                var key = QUESTION_ORDER[i];
                var marker = document.createElement('div');
                marker.className = 'pdf-nav-marker';
                marker.id = 'navMarker_' + i;
                // 均等配置
                var topPercent = (i / QUESTION_ORDER.length) * 95 + 1;
                marker.style.top = topPercent + '%';

                var shortLabel = '';
                if (key === '医療機関名') shortLabel = '機';
                else if (key === '患者さんID') shortLabel = 'ID';
                else {
                    var m = key.match(/質問(\d+)/);
                    shortLabel = m ? 'Q' + m[1] : key.charAt(0);
                }
                // 矩形定義済みなら色を変える
                if (questionRects[key]) {
                    marker.title = shortLabel + ' (定義済み)';
                } else {
                    marker.style.opacity = '0.4';
                    marker.title = shortLabel + ' (未定義)';
                }
                marker.textContent = shortLabel;
                marker.onclick = (function(idx) {
                    return function(e) {
                        e.stopPropagation();
                        highlightPdfPosition(idx);
                        var block = document.getElementById('qblock_' + idx);
                        if (block) block.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    };
                })(i);
                navBar.appendChild(marker);
            }
        }

        // ========== 矩形定義モード ==========
        var rectDefining = false;   // 定義中フラグ
        var rectDefKey = '';        // 定義中の質問キー
        var rectDefIdx = -1;        // 定義中の質問インデックス
        var rectFirstClick = null;  // 1点目座標 {x%, y%}

        function adjustHighlight() {
            var definedCount = Object.keys(questionRects).length;
            var totalCount = QUESTION_ORDER.length;
            var msg = '現在 ' + definedCount + '/' + totalCount + ' 質問の矩形が定義済みです。\n\n';
            msg += '【操作方法】\n';
            msg += '・右側の質問パネルをクリックして質問を選択\n';
            msg += '・「位置合わせ」→ PDF上で回答欄の左上と右下をクリック\n\n';
            if (definedCount > 0) {
                msg += '全てリセットしますか？\n';
                msg += 'OK: 全リセット\nキャンセル: そのまま続ける';
                if (confirm(msg)) {
                    questionRects = {};
                    localStorage.removeItem('webOcrQuestionRects');
                    saveQuestionRectsToDrive();
                    var allH = document.querySelectorAll('.pdf-highlight-rect');
                    for (var h = 0; h < allH.length; h++) allH[h].style.display = 'none';
                    buildNavBar();
                    alert('全ての矩形定義をリセットしました');
                }
            } else {
                // 定義済みがゼロならすぐに現在選択中の質問の定義を開始
                if (activeQuestionIdx >= 0) {
                    startRectDefine(activeQuestionIdx);
                } else {
                    alert(msg + '質問を選択してから「位置合わせ」を押してください');
                }
            }
        }

        var rectDefPageNum = 1;  // 定義中のページ番号

        function startRectDefine(idx) {
            var key = QUESTION_ORDER[idx];
            rectDefining = true;
            rectDefKey = key;
            rectDefIdx = idx;
            rectFirstClick = null;

            // 既存バナー・ドットを消す
            var oldBanner = document.getElementById('calibBanner');
            if (oldBanner) oldBanner.remove();
            var oldDot = document.getElementById('calibDot1');
            if (oldDot) oldDot.remove();

            // バナー表示
            var label = QUESTION_LABELS[key] || key;
            var banner = document.createElement('div');
            banner.className = 'calib-banner';
            banner.id = 'calibBanner';
            banner.textContent = '① 「' + label + '」の回答欄の左上をクリック（Esc: キャンセル）';
            document.body.appendChild(banner);

            // 全ハイライトを非表示
            var allH = document.querySelectorAll('.pdf-highlight-rect');
            for (var h = 0; h < allH.length; h++) allH[h].style.display = 'none';

            // 各ページにクリック透過オーバーレイを追加（canvas上のクリックを確実に拾う）
            for (var p = 1; p <= (pdfDoc ? pdfDoc.numPages : 2); p++) {
                var wrapper = document.getElementById('pdfPage_' + p);
                if (wrapper) {
                    // オーバーレイを作成してwrapper上に被せる
                    var ov = document.createElement('div');
                    ov.className = 'rectdef-overlay';
                    ov.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;z-index:15;';
                    ov.onclick = (function(pageNum) {
                        return function(e) {
                            e.stopPropagation();
                            rectDefClick(e, pageNum);
                        };
                    })(p);
                    wrapper.appendChild(ov);
                }
            }
            // フォールバックiframeの場合: pdfPagesContainer直下のiframeにも対応
            var directIframe = document.querySelector('#pdfPagesContainer > iframe');
            if (directIframe) {
                var overlay = document.createElement('div');
                overlay.className = 'rectdef-overlay';
                overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:800px;cursor:crosshair;z-index:50;';
                overlay.onclick = function(e) {
                    e.stopPropagation();
                    // iframeの場合pdfPage_1がないのでcontainer基準
                    var container = document.getElementById('pdfPagesContainer');
                    var bounds = container.getBoundingClientRect();
                    var clickXPct = ((e.clientX - bounds.left) / bounds.width) * 100;
                    var clickYPct = ((e.clientY - bounds.top) / bounds.height) * 100;
                    rectDefClickDirect(clickXPct, clickYPct, 1);
                };
                var container = document.getElementById('pdfPagesContainer');
                container.style.position = 'relative';
                container.appendChild(overlay);
            }
        }

        function rectDefClick(e, pageNum) {
            // オーバーレイ経由: 親のwrapperから座標計算
            var wrapper = document.getElementById('pdfPage_' + pageNum);
            if (!wrapper) return;
            var bounds = wrapper.getBoundingClientRect();
            var clickXPct = ((e.clientX - bounds.left) / bounds.width) * 100;
            var clickYPct = ((e.clientY - bounds.top) / bounds.height) * 100;
            rectDefClickDirect(clickXPct, clickYPct, pageNum);
        }

        function rectDefClickDirect(clickXPct, clickYPct, pageNum) {
            if (!rectDefining) return;

            if (!rectFirstClick) {
                // 1点目
                rectFirstClick = { x: clickXPct, y: clickYPct };
                rectDefPageNum = pageNum;
                // ドット表示
                var dot = document.createElement('div');
                dot.className = 'calib-dot';
                dot.id = 'calibDot1';
                dot.style.left = clickXPct + '%';
                dot.style.top = clickYPct + '%';
                var w = document.getElementById('pdfPage_' + pageNum);
                if (w) w.appendChild(dot);
                // バナー更新
                var label = QUESTION_LABELS[rectDefKey] || rectDefKey;
                document.getElementById('calibBanner').textContent = '② 「' + label + '」の回答欄の右下をクリック';

        function findValue(ocrData, key) {
            if (ocrData[key] !== undefined) return ocrData[key];

        function getDisplayValue(key, ocrData) {

                var h = findValue(ocrData, '質問5_身長');

                }
                return body ? String(body) : '';
            }
            var val = findValue(ocrData, key);
            if (val === undefined || val === null) return '';
            if (typeof val === 'string') return val;
            if (typeof val === 'number') return String(val);
            if (typeof val === 'object' && !Array.isArray(val)) {
                if (key === '患者さんID') return val['値'] || val['value'] || JSON.stringify(val);
                if (key === '質問1_名前') {
                    if (val['氏'] || val['名']) return (val['氏'] || '') + ' ' + (val['名'] || '');
                }
                if (key === '質問2_生年月日') {
                    if (val['年号']) return val['年号'] + (val['年'] || '') + '年' + (val['月'] ? val['月'] + '月' : '') + (val['日'] ? val['日'] + '日' : '');
                }
                if (key === '質問13_飲酒習慣') return formatAlcohol(val);
                if (key === '質問14_歯の抜去位置') return formatTooth(val);
                if (key === '質問15_コメント') {
                    if (val['内容'] !== undefined) return String(val['内容']);
                    if (val['その他'] !== undefined) return String(val['その他']);
                }
                if (val['回答'] !== undefined) return String(val['回答']);
                var parts = [];
                for (var k in val) { var v = val[k]; if (v === null || v === undefined || v === '') continue; if (typeof v === 'object') v = JSON.stringify(v); parts.push(k + ': ' + v); }

        // 酒類・サイズの番号⇔名前マッピング

        function appendAlcoholNum(value, list) {
            if (!value) return '';
            var idx = -1;
            for (var i = 0; i < list.length; i++) {
                if (list[i] === value || value.indexOf(list[i]) >= 0 || list[i].indexOf(value) >= 0) { idx = i; break; }
            }
            if (idx >= 0) return value + '(' + (idx + 1) + ')';
            // 値が番号の場合
            var num = parseInt(value, 10);
            if (!isNaN(num) && num >= 1 && num <= list.length) return list[num - 1] + '(' + num + ')';
            return value;
        }

        function formatAlcohol(val) {
            var sel = val['飲酒状況'] || val['選択'] || '';
            if (!sel || sel === '未回答') return '未回答';
            if (sel.indexOf('飲まない') >= 0 || sel === 'いいえ') return '飲まない';
            var lines = [sel.indexOf('飲む') >= 0 ? '飲む' : sel];
            for (var i = 1; i <= 3; i++) {
                var block = val['回答' + i];
                if (!block) continue;
                var p = [];
                var typeVal = block['お酒の種類'] || block['酒類'] || '';
                if (typeVal) p.push('酒類: ' + appendAlcoholNum(typeVal, ALCOHOL_TYPE_LIST));
                if (block['週に何回'] || block['頻度_週']) p.push('週' + (block['週に何回'] || block['頻度_週']));
                var sizeVal = block['サイズ_飲み方'] || block['サイズ'] || '';
                if (sizeVal) p.push('サイズ: ' + appendAlcoholNum(sizeVal, ALCOHOL_SIZE_LIST));
                if (block['数量']) p.push('数量: ' + block['数量']);
                if (p.length > 0) lines.push('回答' + i + ': ' + p.join(' / '));
            }
            return lines.join('\n');
        }

        function formatTooth(val) {
            if (val['行1'] || val['行2'] || val['行3']) {
                var lines = [];
                for (var r = 1; r <= 3; r++) {
                    var row = val['行' + r];
                    if (!row) continue;
                    var p = [];
                    if (row['左右']) p.push(row['左右']);
                    if (row['上下']) p.push(row['上下']);
                    if (row['番号']) p.push('番号: ' + row['番号']);
                    if (p.length > 0) lines.push('行' + r + ': ' + p.join(' / '));
                }
                return lines.join('\n');
            }
            var posLines = [];
            for (var n = 1; n <= 3; n++) {
                var pos = val['抜歯位置' + n];
                if (!pos) continue;
                var pp = [];
                if (pos['左右']) pp.push(pos['左右']);
                if (pos['上下']) pp.push(pos['上下']);
                if (pos['番号']) pp.push('番号: ' + pos['番号']);
                if (pp.length > 0) posLines.push('位置' + n + ': ' + pp.join(' / '));
            }
            if (posLines.length > 0) {
                if (val['その他']) posLines.push('その他: ' + val['その他']);
                return posLines.join('\n');
            }
            var parts = [];
            if (val['左右']) parts.push(val['左右']);
            if (val['上下']) parts.push(val['上下']);
            if (val['番号']) parts.push('番号: ' + val['番号']);
            return parts.length > 0 ? parts.join(' / ') : '';
        }

        // ========== 確認・編集 ==========

        // ========== スプレッドシート変換 ==========
        function parseName(value) { if (!value) return null; var m = value.match(/氏:\s*(.+?)\s*\/\s*名:\s*(.+)/); return m ? (m[1].trim() + ' ' + m[2].trim()) : value.trim() || null; }
        function parseBirthdate(value) { if (!value) return [null,null,null,null]; var m = value.split('\n')[0].trim().match(/(昭和|平成|令和)\s*(\d+)\s*年\s*(\d+)\s*月\s*(\d+)\s*日/); return m ? [m[1],m[2],m[3],m[4]] : [null,null,null,null]; }
        function parseBodyInfo(value) { if (!value) return [null,null]; var hm = value.match(/身長:\s*(\d+(?:\.\d+)?)\s*cm/); var wm = value.match(/体重:\s*(\d+(?:\.\d+)?)\s*kg/); return [hm?hm[1]:null, wm?wm[1]:null]; }
        function parseDisease(value) { if (!value) return [null,null]; var v = value.trim(); if (v==='なし') return ['いいえ',null]; if (v==='はい') return ['はい',null]; if (v==='いいえ') return ['いいえ',null]; if (v==='未回答') return [null,null]; if (v==='5年未満') return ['はい','5年未満']; if (v==='5〜10年前'||v==='5～10年前') return ['はい','5〜10年前']; if (v==='10年以上前') return ['はい','10年以上前']; if (v==='わからない') return ['はい','わからない']; return [v,null]; }
        function parseGender(value) { if (!value) return null; var map = {'男':'男性','男性':'男性','女':'女性','女性':'女性','その他':'その他','未回答':null}; return map[value.trim()]!==undefined ? map[value.trim()] : value.trim(); }
        function parseExercise(value) { if (!value) return null; var v = value.trim(); if (v==='未回答') return null; return v; }
        function parseSweets(value) { if (!value) return null; var map = {'ほぼ毎日':'ほぼ毎日','週2~3回':'週2～3回','週2～3回':'週2～3回','週1回以下または食べない':'週1回以下','週1回以下':'週1回以下','食べない':'食べない','未回答':null}; return map[value.trim()]!==undefined ? map[value.trim()] : value.trim(); }
        function parseDrinks(value) { if (!value) return null; if (value.indexOf('有糖')>=0) return '有糖飲料(ジュース、炭酸飲料、スポーツドリンク、加糖コーヒーなど)'; if (value.indexOf('無糖')>=0) return '無糖飲料(お茶、水、炭酸水、無糖コーヒーなど)'; if (value.trim()==='未回答') return null; return value.trim(); }
        function parseAlcohol(value) {
            var keys = ['24. お酒（ビール、ワイン、焼酎、ウイスキーなど）を習慣的に飲みますか？','25. お酒の種類','26. 週に何回飲みますか？(回)','27. 1回あたりのサイズ/飲み方は？','28. 数量','29. 他にもよく飲むお酒はありますか？','30. お酒の種類','31. 週に何回飲みますか？(回)','32. 1回あたりのサイズ/飲み方は？','33. 数量','34. 他にもよく飲むお酒はありますか？','35. お酒の種類','36. 週に何回飲みますか？(回)','37. 1回あたりのサイズ/飲み方は？','38. 数量','39. 他にもよく飲むお酒はありますか？'];
            var r = {}; for (var i=0;i<keys.length;i++) r[keys[i]]='';
            if (!value) return r;
            var lines = value.trim().split('\n'); var sel = lines[0]||'';
            if (sel.indexOf('飲まない')>=0) { r[keys[0]]='いいえ（ほとんど飲まない）'; return r; }
            if (sel.indexOf('飲む')>=0) r[keys[0]]='はい（習慣的に飲む）'; else return r;
            var blocks=[],cur=null;
            for (var i=1;i<lines.length;i++) { var line=lines[i].trim(); if (line.match(/^回答\d/)) { if(cur!==null)blocks.push(cur); cur=line; } else if(cur!==null) { cur+=' '+line; } }
            if (cur!==null) blocks.push(cur);
            for (var i=0;i<Math.min(blocks.length,3);i++) { var b=blocks[i],base=1+i*5; var km=b.match(/酒類[:：]\s*(\S+)/); if(km) r[keys[base]]=km[1]; var fm=b.match(/週\s*(\d+)\s*回/); if(fm) r[keys[base+1]]=fm[1]; var sm=b.match(/サイズ[:：]\s*(.+?)(?:\s+数量|$)/); if(sm) r[keys[base+2]]=sm[1].trim(); var qm=b.match(/数量[:：]\s*(\d+)/); if(qm) r[keys[base+3]]=qm[1]; r[keys[base+4]]=(i<blocks.length-1)?'ある':'ない'; }
            return r;
        }

        function convertToSurveyFormat(input) {
            var o = {};
            o['1. 受診中の歯科医院を選んでください。'] = input['医療機関名'] || '';
            o['2. ID番号'] = input['患者さんID'] || '';

            var bd = parseBirthdate(input['質問2_生年月日']);
            o['4. 生年月日 - 年号'] = bd[0] || '';
            o['5. - 年（半角数字）'] = bd[1] || '';
            o['6. - 月（半角数字）'] = bd[2] || '';

        }

        // ========== ユーティリティ ==========
        function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escapeAttr(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
